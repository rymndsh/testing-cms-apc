<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Artikel - APC Research Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background-color: #f0f9ff; /* bg-sky-50 */
      }
      .file-input-wrapper input[type="file"] {
        font-size: 100px;
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        cursor: pointer;
      }
      .swal2-popup {
        font-family: inherit !important;
        border-radius: 1.5rem !important;
      }
    </style>
  </head>
  <body class="font-sans text-slate-800 flex h-screen overflow-hidden">
    <aside
      class="w-64 bg-white border-r border-sky-100 flex flex-col rounded-r-[2rem] shadow-sm flex-shrink-0 z-10"
    >
      <div class="p-8 pb-4">
        <a href="dashboard.html" class="block cursor-pointer">
          <img
            src="logo-nci.png"
            alt="Nano Center Indonesia"
            class="w-40 mx-auto hover:opacity-80 transition"
          />
        </a>
      </div>
      <nav class="flex-1 mt-6">
        <a
          href="artikel.html"
          class="flex items-center px-8 py-3 bg-sky-50 border-r-4 border-sky-500 text-sky-600 transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-3"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"
            />
          </svg>
          <span class="font-medium text-sm">Artikel</span>
        </a>
        <a
          href="people.html"
          class="flex items-center px-8 py-3 text-slate-500 hover:bg-sky-50 hover:text-sky-600 transition-colors cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-3"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <span class="font-medium text-sm">People</span>
        </a>
      </nav>
      <div
        class="p-6 border-t border-sky-50 mt-auto bg-white rounded-br-[2rem]"
      >
        <a
          href="index.html"
          class="flex items-center justify-center gap-2 text-red-500 hover:bg-red-50 hover:text-red-600 font-semibold rounded-lg transition py-2 text-sm"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <main class="flex-1 p-8 md:p-10 overflow-y-auto">
      <div
        class="bg-white rounded-[2rem] shadow-sm p-8 md:p-10 max-w-5xl mx-auto border border-sky-50 min-h-[650px] relative"
      >
        <div id="list-view" class="block w-full h-full flex flex-col relative">
          <h2
            class="text-3xl font-medium mb-8 flex items-center text-slate-800"
          >
            <i class="fa-regular fa-file-lines text-sky-500 mr-3"></i> Daftar
            Artikel
          </h2>

          <div
            class="border border-sky-100 rounded-2xl overflow-hidden shadow-sm mb-16 bg-white"
          >
            <table
              class="w-full text-left text-sm text-slate-700 border-collapse"
            >
              <thead>
                <tr
                  class="text-slate-500 border-b border-sky-100 bg-sky-50/50 text-xs font-semibold uppercase"
                >
                  <th class="p-4">Judul Artikel</th>
                  <th class="p-4">Penulis</th>
                  <th class="p-4">Tahun</th>
                  <th class="p-4 text-right">Aksi</th>
                </tr>
              </thead>
              <tbody
                id="articles-table-body"
                class="divide-y divide-sky-50"
              ></tbody>
            </table>
          </div>

          <div class="absolute bottom-0 right-0 p-2 bg-white rounded-full">
            <button
              onclick="showView('add-view')"
              class="bg-sky-100 hover:bg-sky-200 text-sky-700 font-semibold py-2.5 px-6 rounded-full flex items-center gap-2 transition-colors text-sm shadow-sm"
            >
              <i class="fa-solid fa-plus text-sky-700"></i> Upload Artikel Baru
            </button>
          </div>
        </div>

        <div id="add-view" class="hidden w-full h-full flex flex-col relative">
          <h2
            class="text-3xl font-medium mb-8 flex items-center text-slate-800"
          >
            <i class="fa-solid fa-plus text-sky-500 mr-3"></i> Upload Artikel
            Baru
          </h2>
          <form id="add-form" class="space-y-6 max-w-4xl pb-16">
            <div class="border border-sky-200 rounded-xl p-4 bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2"
                >Judul Artikel</label
              >
              <input
                type="text"
                id="add-title"
                required
                class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
              />
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2"
                  >Link Artikel</label
                >
                <input
                  type="url"
                  id="add-link"
                  required
                  class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
                />
              </div>
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2"
                  >DOI Artikel</label
                >
                <input
                  type="text"
                  id="add-doi"
                  class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
                />
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2"
                  >Nama Pembuat Artikel</label
                >
                <input
                  type="text"
                  id="add-author"
                  required
                  class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
                />
              </div>
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2"
                  >Tahun Artikel</label
                >
                <input
                  type="number"
                  id="add-year"
                  required
                  class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
                />
              </div>
            </div>
            <div
              class="border border-sky-200 rounded-xl p-4 relative file-input-wrapper overflow-hidden cursor-pointer bg-white"
            >
              <label class="block text-sm font-semibold text-sky-700 mb-2"
                >Gambar Artikel</label
              >
              <input type="file" id="add-file" accept="image/*" />
              <div
                class="border border-dashed border-sky-300 rounded-lg h-32 flex items-center justify-center bg-sky-50/50 hover:bg-sky-100 transition-colors text-sky-400 overflow-hidden"
              >
                <img
                  id="add-preview"
                  src="#"
                  alt="Preview"
                  class="hidden h-full w-full object-cover"
                />
                <i
                  id="add-placeholder-icon"
                  class="fa-regular fa-image text-4xl"
                ></i>
              </div>
            </div>
            <div
              class="absolute bottom-0 right-0 flex gap-3 p-2 bg-white rounded-full"
            >
              <button
                type="button"
                onclick="showView('list-view')"
                class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-2.5 px-6 rounded-full transition-colors"
              >
                <i class="fa-solid fa-xmark"></i> BATAL
              </button>
              <button
                type="submit"
                class="flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-bold py-2.5 px-6 rounded-full transition-colors shadow-sm"
              >
                <i class="fa-solid fa-cloud-arrow-up"></i> SIMPAN ARTIKEL
              </button>
            </div>
          </form>
        </div>

        <div id="edit-view" class="hidden w-full h-full flex flex-col relative">
          <h2
            class="text-3xl font-medium mb-8 flex items-center text-slate-800"
          >
            <i class="fa-solid fa-marker text-sky-500 mr-3"></i> Edit Artikel
          </h2>
          <form id="edit-form" class="space-y-6 max-w-4xl pb-16">
            <input type="hidden" id="edit-id" />
            <div class="border border-sky-200 rounded-xl p-4 bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2"
                >Judul Artikel</label
              >
              <input
                type="text"
                id="edit-title"
                required
                class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
              />
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2"
                  >Link Artikel</label
                >
                <input
                  type="url"
                  id="edit-link"
                  required
                  class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
                />
              </div>
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2"
                  >DOI Artikel</label
                >
                <input
                  type="text"
                  id="edit-doi"
                  class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
                />
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2"
                  >Nama Pembuat Artikel</label
                >
                <input
                  type="text"
                  id="edit-author"
                  required
                  class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
                />
              </div>
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2"
                  >Tahun Artikel</label
                >
                <input
                  type="number"
                  id="edit-year"
                  required
                  class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
                />
              </div>
            </div>
            <div
              class="border border-sky-200 rounded-xl p-4 relative file-input-wrapper overflow-hidden cursor-pointer bg-white"
            >
              <label class="block text-sm font-semibold text-sky-700 mb-2"
                >Ganti Gambar Artikel</label
              >
              <input type="file" id="edit-file" accept="image/*" />
              <div
                class="border border-dashed border-sky-300 rounded-lg h-32 flex items-center justify-center bg-sky-50/50 hover:bg-sky-100 transition-colors text-sky-400 overflow-hidden"
              >
                <img
                  id="edit-preview"
                  src="#"
                  alt="Preview"
                  class="hidden h-full w-full object-cover"
                />
                <i
                  id="edit-placeholder-icon"
                  class="fa-regular fa-image text-4xl"
                ></i>
              </div>
            </div>
            <div
              class="absolute bottom-0 right-0 flex gap-3 p-2 bg-white rounded-full w-full justify-end"
            >
              <button
                type="button"
                id="delete-article-btn"
                class="flex items-center gap-2 bg-red-100 hover:bg-red-200 text-red-700 text-sm font-bold py-2.5 px-6 rounded-full transition-colors mr-auto"
              >
                <i class="fa-solid fa-trash-can"></i> HAPUS ARTIKEL
              </button>
              <button
                type="button"
                onclick="showView('list-view')"
                class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-2.5 px-6 rounded-full transition-colors"
              >
                <i class="fa-solid fa-xmark"></i> BATAL
              </button>
              <button
                type="submit"
                class="flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-bold py-2.5 px-6 rounded-full transition-colors shadow-sm"
              >
                <i class="fa-solid fa-floppy-disk"></i> SIMPAN PERUBAHAN
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script>
      const STORAGE_KEY = "apc_articles_data";
      const defaultArticles = [
        {
          id: 101,
          title: "Nanoparticle Synthesis",
          author: "Dr. Arramel",
          year: "2026",
          link: "#",
          doi: "10.1000/xyz123",
          date: "2026-05-24",
          imageUrl: null,
        },
        {
          id: 102,
          title: "Nanoparticle Synthesis A",
          author: "Tim Peneliti NCI",
          year: "2026",
          link: "#",
          doi: "10.1000/xyz456",
          date: "2026-05-24",
          imageUrl: null,
        },
        {
          id: 103,
          title: "Nanoparticle Publication Draft",
          author: "Staf Riset",
          year: "2026",
          link: "#",
          doi: "",
          date: "2026-05-24",
          imageUrl: null,
        },
      ];

      let articlesData =
        JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultArticles;
      let currentAddImage = null,
        currentEditImage = null;

      function saveArticles() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(articlesData));
      }

      function renderArticles() {
        const tbody = document.getElementById("articles-table-body");
        tbody.innerHTML = "";
        articlesData.forEach((art) => {
          const tr = document.createElement("tr");
          tr.className = "hover:bg-sky-50/50 transition border-b border-sky-50";
          tr.innerHTML = `
                    <td class="p-4 font-medium text-slate-800 max-w-md truncate">${art.title}</td>
                    <td class="p-4 text-slate-600">${art.author}</td>
                    <td class="p-4 text-slate-500 font-mono text-xs">${art.year}</td>
                    <td class="p-4 text-right">
                        <button onclick="openEditView(${art.id})" class="text-sky-600 hover:text-sky-800 font-semibold text-xs bg-sky-100 hover:bg-sky-200 px-3 py-1.5 rounded-full transition-colors">
                            <i class="fa-solid fa-pen-to-square"></i> Edit
                        </button>
                    </td>
                `;
          tbody.appendChild(tr);
        });
      }

      function showView(viewId) {
        document.getElementById("list-view").classList.add("hidden");
        document.getElementById("add-view").classList.add("hidden");
        document.getElementById("edit-view").classList.add("hidden");
        document.getElementById(viewId).classList.remove("hidden");
        if (viewId === "list-view") {
          resetImage("add");
          resetImage("edit");
        }
      }

      function openEditView(id) {
        const art = articlesData.find((a) => a.id === id);
        if (art) {
          document.getElementById("edit-id").value = art.id;
          document.getElementById("edit-title").value = art.title;
          document.getElementById("edit-link").value = art.link;
          document.getElementById("edit-doi").value = art.doi;
          document.getElementById("edit-author").value = art.author;
          document.getElementById("edit-year").value = art.year;
          currentEditImage = art.imageUrl;
          if (art.imageUrl) {
            showPreview("edit", art.imageUrl);
          } else {
            resetImage("edit");
          }
          showView("edit-view");
        }
      }

      function initImageUpload(inputId, prefix) {
        document
          .getElementById(inputId)
          .addEventListener("change", function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
              if (prefix === "add") currentAddImage = ev.target.result;
              else currentEditImage = ev.target.result;
              showPreview(prefix, ev.target.result);
            };
            reader.readAsDataURL(file);
          });
      }
      function showPreview(pfx, src) {
        document.getElementById(`${pfx}-preview`).src = src;
        document.getElementById(`${pfx}-preview`).classList.remove("hidden");
        document
          .getElementById(`${pfx}-placeholder-icon`)
          .classList.add("hidden");
      }
      function resetImage(pfx) {
        document.getElementById(`${pfx}-preview`).src = "#";
        document.getElementById(`${pfx}-preview`).classList.add("hidden");
        document
          .getElementById(`${pfx}-placeholder-icon`)
          .classList.remove("hidden");
        document.getElementById(`${pfx}-file`).value = "";
        if (pfx === "add") currentAddImage = null;
        else currentEditImage = null;
      }

      initImageUpload("add-file", "add");
      initImageUpload("edit-file", "edit");

      // ==========================================
      // KONFIGURASI GITHUB API
      // ==========================================
      const GITHUB_TOKEN = "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";
      const GITHUB_OWNER = "rymndsh";
      const GITHUB_REPO = "testing-cms-apc";

      document
        .getElementById("add-form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const title = document.getElementById("add-title").value;
          const link = document.getElementById("add-link").value;
          const doi = document.getElementById("add-doi").value;
          const author = document.getElementById("add-author").value;
          const year = document.getElementById("add-year").value;

          const dateObj = new Date();
          const today = dateObj.toISOString().split("T")[0]; // YYYY-MM-DD

          const slug = title
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/(^-|-$)+/g, "");

          // ✅ FIX: Tambah Date.now() agar nama file selalu unik
          // Sebelum: `_posts/${today}-${slug}.md`  ← bisa bentrok jika judul sama
          // Sesudah: `_posts/${today}-${slug}-${Date.now()}.md`  ← selalu unik
          const uniqueId = Date.now();
          const fileName = `_posts/${today}-${slug}-${uniqueId}.md`;

          const markdownContent = `---
layout: post
title: "${title}"
author: "${author}"
year: ${year}
link: "${link}"
doi: "${doi}"
date: ${dateObj.toISOString()}
---

Artikel ini diunggah melalui Custom Dashboard APC Research.
Tautan referensi: [Baca Selengkapnya](${link})
`;

          const encodedContent = btoa(
            unescape(encodeURIComponent(markdownContent)),
          );

          const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${fileName}`;
          const payload = {
            message: `Admin: Publish artikel "${title}"`,
            content: encodedContent,
            branch: "main",
            // Tidak perlu sha karena file ini PASTI baru (nama file selalu unik)
          };

          Swal.fire({
            title: "Mengunggah ke GitHub...",
            text: "Mohon tunggu sebentar",
            allowOutsideClick: false,
            didOpen: () => {
              Swal.showLoading();
            },
          });

          try {
            const response = await fetch(apiUrl, {
              method: "PUT",
              headers: {
                Authorization: `token ${GITHUB_TOKEN}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify(payload),
            });

            if (response.ok) {
              articlesData.unshift({
                id: uniqueId,
                title,
                link,
                doi,
                author,
                year,
                imageUrl: currentAddImage,
                date: today,
              });
              saveArticles();
              renderArticles();
              showView("list-view");
              document.getElementById("add-form").reset();
              resetImage("add");

              Swal.fire({
                title: "Berhasil Publish!",
                text: "File Markdown berhasil di-push ke repositori GitHub.",
                icon: "success",
                confirmButtonColor: "#0ea5e9",
              });
            } else {
              const errorData = await response.json();
              Swal.fire({
                title: "Gagal Push!",
                text: `Error: ${errorData.message}`,
                icon: "error",
              });
            }
          } catch (error) {
            Swal.fire({
              title: "Error Jaringan",
              text: "Gagal menyambung ke API GitHub.",
              icon: "error",
            });
          }
        });

      document
        .getElementById("edit-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const id = parseInt(document.getElementById("edit-id").value);
          const idx = articlesData.findIndex((a) => a.id === id);
          if (idx !== -1) {
            articlesData[idx].title =
              document.getElementById("edit-title").value;
            articlesData[idx].link = document.getElementById("edit-link").value;
            articlesData[idx].doi = document.getElementById("edit-doi").value;
            articlesData[idx].author =
              document.getElementById("edit-author").value;
            articlesData[idx].year = document.getElementById("edit-year").value;
            articlesData[idx].imageUrl = currentEditImage;
            saveArticles();
            renderArticles();
            showView("list-view");
            Swal.fire({
              title: "Diperbarui!",
              text: "Perubahan artikel berhasil disimpan.",
              icon: "success",
              timer: 1500,
              showConfirmButton: false,
              confirmButtonColor: "#0ea5e9",
            });
          }
        });

      document
        .getElementById("delete-article-btn")
        .addEventListener("click", function () {
          const id = parseInt(document.getElementById("edit-id").value);
          const title = document.getElementById("edit-title").value;
          Swal.fire({
            title: "Hapus Artikel?",
            text: `Yakin ingin menghapus artikel "${title}"?`,
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#ef4444",
            cancelButtonColor: "#64748b",
            confirmButtonText: "Ya, Hapus!",
            cancelButtonText: "Batal",
            reverseButtons: true,
          }).then((res) => {
            if (res.isConfirmed) {
              articlesData = articlesData.filter((a) => a.id !== id);
              saveArticles();
              renderArticles();
              showView("list-view");
              Swal.fire({
                title: "Terhapus!",
                text: "Artikel telah berhasil dihapus.",
                icon: "success",
                timer: 1500,
                showConfirmButton: false,
              });
            }
          });
        });

      renderArticles();
    </script>
  </body>
</html>
