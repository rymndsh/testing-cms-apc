<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Artikel Baru - APC Research</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background-color: #f8f9fa;
      }
      .file-input-wrapper input[type="file"] {
        font-size: 100px;
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        cursor: pointer;
      }
      .swal2-popup {
        font-family: inherit !important;
        border-radius: 1.5rem !important;
      }
    </style>
  </head>
  <body class="font-sans text-gray-800 flex h-screen overflow-hidden">
    <aside
      class="w-64 bg-white border-r border-gray-200 flex flex-col rounded-r-[2rem] shadow-sm flex-shrink-0 z-10"
    >
      <div class="p-8 pb-4">
        <a href="dashboard.html" class="block cursor-pointer">
          <img
            src="logo-nci.png"
            alt="Nano Center Indonesia"
            class="w-40 mx-auto hover:opacity-80 transition"
          />
        </a>
      </div>
      <nav class="flex-1 mt-6">
        <a
          href="upload.html"
          class="flex items-center px-8 py-3 bg-gray-50 border-r-4 border-red-600 text-red-600 transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-3"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"
            />
          </svg>
          <span class="font-medium text-sm">Upload Artikel</span>
        </a>
        <a
          href="people.html"
          class="flex items-center px-8 py-3 text-gray-700 hover:bg-gray-50 transition-colors cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-3"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <span class="font-medium text-sm">People</span>
        </a>
      </nav>
      <div
        class="p-6 border-t border-gray-100 mt-auto bg-white rounded-br-[2rem]"
      >
        <a
          href="index.html"
          class="flex items-center justify-center gap-2 text-red-500 hover:bg-red-50 hover:text-red-600 font-semibold rounded-lg transition py-2 text-sm"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <main class="flex-1 p-8 md:p-10 overflow-y-auto relative">
      <div
        class="bg-white rounded-[2rem] shadow-sm p-8 md:p-10 max-w-5xl mx-auto border border-gray-100 pb-20"
      >
        <div class="flex items-center mb-8">
          <i class="fa-regular fa-file-lines text-3xl text-red-600 mr-4"></i>
          <h1 class="text-3xl font-medium text-gray-900">
            Upload Artikel Baru
          </h1>
        </div>

        <form id="upload-form" class="space-y-6">
          <div class="border border-gray-400 rounded-xl p-4">
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >Judul Artikel</label
            >
            <input
              type="text"
              id="upload-title"
              required
              class="w-full border border-gray-400 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gray-200"
            />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="border border-gray-400 rounded-xl p-4">
              <label class="block text-sm font-medium text-gray-700 mb-2"
                >Link Artikel</label
              >
              <input
                type="url"
                id="upload-link"
                required
                class="w-full border border-gray-400 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gray-200"
              />
            </div>
            <div class="border border-gray-400 rounded-xl p-4">
              <label class="block text-sm font-medium text-gray-700 mb-2"
                >DOI Artikel</label
              >
              <input
                type="text"
                id="upload-doi"
                class="w-full border border-gray-400 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gray-200"
              />
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="border border-gray-400 rounded-xl p-4">
              <label class="block text-sm font-medium text-gray-700 mb-2"
                >Nama Pembuat Artikel</label
              >
              <input
                type="text"
                id="upload-author"
                required
                class="w-full border border-gray-400 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gray-200"
              />
            </div>
            <div class="border border-gray-400 rounded-xl p-4">
              <label class="block text-sm font-medium text-gray-700 mb-2"
                >Tahun Artikel</label
              >
              <input
                type="number"
                id="upload-year"
                required
                class="w-full border border-gray-400 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gray-200"
              />
            </div>
          </div>

          <div
            class="border border-gray-400 rounded-xl p-4 relative file-input-wrapper overflow-hidden cursor-pointer"
          >
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >Gambar Artikel</label
            >
            <input
              type="file"
              id="upload-file"
              accept="image/*"
              class="cursor-pointer"
            />
            <div
              class="border border-gray-400 rounded-lg h-40 flex items-center justify-center bg-white hover:bg-gray-50 transition-colors text-gray-400 overflow-hidden"
            >
              <img
                id="upload-preview"
                src="#"
                alt="Preview"
                class="hidden h-full w-full object-cover"
              />
              <i
                id="upload-placeholder-icon"
                class="fa-regular fa-image text-4xl"
              ></i>
            </div>
          </div>

          <div
            class="absolute bottom-0 right-10 flex gap-3 p-2 bg-white rounded-full translate-y-4"
          >
            <button
              type="button"
              onclick="window.location.href = 'dashboard.html'"
              class="flex items-center gap-2 bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm font-bold py-2.5 px-6 rounded-full transition-colors"
            >
              <i class="fa-solid fa-xmark"></i> BATAL
            </button>
            <button
              type="submit"
              class="flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white text-sm font-bold py-2.5 px-6 rounded-full transition-colors shadow-sm"
            >
              <i class="fa-solid fa-cloud-arrow-up"></i> SIMPAN ARTIKEL
            </button>
          </div>
        </form>
      </div>
    </main>

    <script>
      const STORAGE_KEY = "apc_articles_data";
      let currentImageBase64 = null;

      // Logika Upload & Preview Gambar
      const fileInput = document.getElementById("upload-file");
      const previewImg = document.getElementById("upload-preview");
      const placeholderIcon = document.getElementById(
        "upload-placeholder-icon",
      );

      fileInput.addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (event) {
          currentImageBase64 = event.target.result;
          previewImg.src = currentImageBase64;
          previewImg.classList.remove("hidden");
          placeholderIcon.classList.add("hidden");
        };
        reader.readAsDataURL(file);
      });

      // Submit Form ke Local Storage
      document
        .getElementById("upload-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          // Ambil data yang ada, atau buat array kosong jika belum ada
          let articles = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

          // Format tanggal hari ini (YYYY-MM-DD)
          const today = new Date().toISOString().split("T")[0];

          // Buat objek artikel baru
          const newArticle = {
            id: Date.now(),
            title: document.getElementById("upload-title").value,
            link: document.getElementById("upload-link").value,
            doi: document.getElementById("upload-doi").value,
            author: document.getElementById("upload-author").value,
            year: document.getElementById("upload-year").value,
            imageUrl: currentImageBase64,
            date: today,
          };

          // Masukkan artikel baru ke posisi paling awal (unshift)
          articles.unshift(newArticle);

          // Simpan kembali ke Local Storage
          localStorage.setItem(STORAGE_KEY, JSON.stringify(articles));

          // Tampilkan SweetAlert dan redirect
          Swal.fire({
            title: "Tersimpan!",
            text: "Artikel baru telah berhasil ditambahkan.",
            icon: "success",
            confirmButtonColor: "#3b82f6",
          }).then(() => {
            window.location.href = "dashboard.html";
          });
        });
    </script>
  </body>
</html>
