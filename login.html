<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - APC Research Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .bg-baby-blue-gradient {
        background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
      }
      .bg-cyan-gradient {
        background: linear-gradient(90deg, #0284c7 0%, #0ea5e9 100%);
      }
    </style>
  </head>
  <body class="bg-baby-blue-gradient min-h-screen font-sans text-gray-800">
    <div class="flex items-center justify-center min-h-screen p-6">
      <div class="flex flex-col md:flex-row items-center gap-12 max-w-4xl w-full">
        <div class="flex-1 text-center md:text-left">
          <h1 class="text-4xl font-bold mb-4 text-slate-800">WELCOME!</h1>
          <img
            src="logo-nci.png"
            alt="Nano Center Indonesia"
            class="w-64 mb-6 mx-auto md:mx-0"
          />
          <p class="text-sm text-slate-700 leading-relaxed max-w-sm">
            Nano Center Indonesia adalah lembaga riset dan pengembangan
            nanoteknologi swasta yang berfokus secara strategis pada sintesis
            nanomaterial.
          </p>
        </div>

        <div class="bg-white/80 backdrop-blur-md p-8 rounded-2xl shadow-xl border border-white/50 w-full max-w-md">
          <h2 class="text-2xl font-bold text-center mb-6 text-slate-800 uppercase tracking-wider">
            Login
          </h2>

          <!-- Pesan error -->
          <div id="error-msg" class="hidden mb-4 bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl text-center">
            Username atau password salah.
          </div>

          <form id="login-form" class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">User Name</label>
              <input
                type="text"
                id="username"
                class="w-full px-4 py-2 rounded-full border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-sky-400 text-slate-800"
                placeholder="Masukkan username"
                required
              />
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Password</label>
              <input
                type="password"
                id="password"
                class="w-full px-4 py-2 rounded-full border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-sky-400 text-slate-800"
                placeholder="Masukkan password"
                required
              />
            </div>

            <!-- INPUT TOKEN GITHUB -->
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">
                GitHub Token
                <span class="normal-case text-slate-400 font-normal ml-1">(Personal Access Token)</span>
              </label>
              <input
                type="password"
                id="github-token"
                class="w-full px-4 py-2 rounded-full border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-sky-400 text-slate-800 font-mono text-sm"
                placeholder="ghp_xxxxxxxxxxxx"
                required
              />
              <p class="text-xs text-slate-400 mt-1.5 ml-2">
                Token disimpan di browser kamu, tidak pernah ke server.
              </p>
            </div>

            <div class="pt-4">
              <button
                type="submit"
                class="w-full bg-cyan-gradient text-white font-bold py-2 px-4 rounded-full shadow-md hover:opacity-90 transition duration-200 uppercase tracking-widest text-sm"
              >
                LOGIN
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      // Kredensial admin — ganti sesuai kebutuhan
      const ADMIN_USERNAME = "admin";
      const ADMIN_PASSWORD = "apc2026";

      // Kalau sudah login sebelumnya, langsung masuk
      if (localStorage.getItem("apc_logged_in") === "true" && localStorage.getItem("github_token")) {
        window.location.href = "dashboard.html";
      }

      document.getElementById("login-form").addEventListener("submit", function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const token = document.getElementById("github-token").value.trim();

        if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
          // Simpan token dan status login ke localStorage
          localStorage.setItem("github_token", token);
          localStorage.setItem("apc_logged_in", "true");
          window.location.href = "dashboard.html";
        } else {
          document.getElementById("error-msg").classList.remove("hidden");
        }
      });
    </script>
  </body>
</html>
