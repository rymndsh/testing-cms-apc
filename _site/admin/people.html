<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>People - APC Research Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background-color: #f0f9ff;
      }
      .file-input-wrapper input[type="file"] {
        font-size: 100px;
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        cursor: pointer;
      }
      .swal2-popup {
        font-family: inherit !important;
        border-radius: 1.5rem !important;
      }
    </style>
  </head>
  <body class="font-sans text-slate-800 flex h-screen overflow-hidden">
    <aside
      class="w-64 bg-white border-r border-sky-100 flex flex-col rounded-r-[2rem] shadow-sm flex-shrink-0 z-10"
    >
      <div class="p-8 pb-4">
        <a href="dashboard.html" class="block cursor-pointer">
          <img
            src="logo-nci.png"
            alt="Nano Center Indonesia"
            class="w-40 mx-auto hover:opacity-80 transition"
          />
        </a>
      </div>
      <nav class="flex-1 mt-6">
        <a
          href="artikel.html"
          class="flex items-center px-8 py-3 text-slate-500 hover:bg-sky-50 hover:text-sky-600 transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-3"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"
            />
          </svg>
          <span class="font-medium text-sm">Artikel</span>
        </a>
        <a
          href="people.html"
          class="flex items-center px-8 py-3 bg-sky-50 border-r-4 border-sky-500 text-sky-600 transition-colors cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-3"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <span class="font-medium text-sm">People</span>
        </a>
      </nav>
      <div
        class="p-6 border-t border-sky-50 mt-auto bg-white rounded-br-[2rem]"
      >
        <a
          href="index.html"
          class="flex items-center justify-center gap-2 text-red-500 hover:bg-red-50 hover:text-red-600 font-semibold rounded-lg transition py-2 text-sm"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <main class="flex-1 p-8 md:p-10 overflow-y-auto">
      <div
        class="bg-white rounded-[2rem] shadow-sm p-8 md:p-10 max-w-5xl mx-auto border border-sky-50 min-h-[650px] relative"
      >
        <div id="list-view" class="block w-full h-full flex flex-col relative">
          <h2
            class="text-3xl font-medium mb-8 flex items-center text-slate-800"
          >
            <i class="fa-solid fa-user-group text-sky-500 mr-3"></i> Tim
            Peneliti
          </h2>

          <div
            id="members-grid"
            class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16"
          ></div>

          <div class="absolute bottom-0 right-0 p-2 bg-white rounded-full">
            <button
              onclick="showView('add-view')"
              class="bg-sky-100 hover:bg-sky-200 text-sky-700 font-semibold py-2.5 px-6 rounded-full flex items-center gap-2 transition-colors text-sm shadow-sm"
            >
              <i class="fa-solid fa-plus text-sky-700"></i> Tambah Member
            </button>
          </div>
        </div>

        <div id="add-view" class="hidden w-full h-full flex flex-col relative">
          <h2
            class="text-3xl font-medium mb-8 flex items-center text-slate-800"
          >
            <i class="fa-solid fa-user-plus text-sky-500 mr-3"></i> Tambah
            Member Baru
          </h2>
          <form id="add-form" class="flex flex-col gap-6 max-w-2xl pb-16">
            <div class="border border-sky-200 rounded-xl p-4 bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2"
                >Nama Lengkap</label
              >
              <input
                type="text"
                id="add-name"
                required
                class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
              />
            </div>
            <div class="border border-sky-200 rounded-xl p-4 bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2"
                >Institusi Pendidikan</label
              >
              <input
                type="text"
                id="add-institution"
                required
                class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
              />
            </div>
            <div
              class="border border-sky-200 rounded-xl p-4 relative file-input-wrapper overflow-hidden cursor-pointer bg-white"
            >
              <label class="block text-sm font-semibold text-sky-700 mb-2"
                >Upload Gambar Member</label
              >
              <input
                type="file"
                id="add-file"
                accept="image/*"
                class="cursor-pointer"
              />
              <div
                id="add-image-box"
                class="border border-dashed border-sky-300 rounded-lg h-32 flex items-center justify-center bg-sky-50/50 hover:bg-sky-100 transition-colors text-sky-400 overflow-hidden"
              >
                <img
                  id="add-preview"
                  src="#"
                  alt="Preview"
                  class="hidden h-full w-full object-cover"
                />
                <i
                  id="add-placeholder-icon"
                  class="fa-regular fa-image text-4xl"
                ></i>
              </div>
            </div>
            <div
              class="absolute bottom-0 right-0 flex gap-3 p-2 bg-white rounded-full"
            >
              <button
                type="button"
                onclick="showView('list-view')"
                class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-2.5 px-6 rounded-full transition-colors"
              >
                <i class="fa-solid fa-xmark"></i> BATAL
              </button>
              <button
                type="submit"
                class="flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-bold py-2.5 px-6 rounded-full transition-colors shadow-sm"
              >
                <i class="fa-solid fa-plus"></i> SIMPAN MEMBER
              </button>
            </div>
          </form>
        </div>

        <div id="edit-view" class="hidden w-full h-full flex flex-col relative">
          <h2
            class="text-3xl font-medium mb-8 flex items-center text-slate-800"
          >
            <i class="fa-solid fa-user-pen text-sky-500 mr-3"></i> Edit Member
          </h2>
          <form id="edit-form" class="flex flex-col gap-6 max-w-2xl pb-16">
            <input type="hidden" id="edit-id" />
            <div class="border border-sky-200 rounded-xl p-4 bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2"
                >Nama Lengkap</label
              >
              <input
                type="text"
                id="edit-name"
                required
                class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
              />
            </div>
            <div class="border border-sky-200 rounded-xl p-4 bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2"
                >Institusi Pendidikan</label
              >
              <input
                type="text"
                id="edit-institution"
                required
                class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30"
              />
            </div>
            <div
              class="border border-sky-200 rounded-xl p-4 relative file-input-wrapper overflow-hidden cursor-pointer bg-white"
            >
              <label class="block text-sm font-semibold text-sky-700 mb-2"
                >Ganti Gambar Baru</label
              >
              <input
                type="file"
                id="edit-file"
                accept="image/*"
                class="cursor-pointer"
              />
              <div
                id="edit-image-box"
                class="border border-dashed border-sky-300 rounded-lg h-32 flex items-center justify-center bg-sky-50/50 hover:bg-sky-100 transition-colors text-sky-400 overflow-hidden"
              >
                <img
                  id="edit-preview"
                  src="#"
                  alt="Preview"
                  class="hidden h-full w-full object-cover"
                />
                <i
                  id="edit-placeholder-icon"
                  class="fa-regular fa-image text-4xl"
                ></i>
              </div>
            </div>
            <div
              class="absolute bottom-0 right-0 flex gap-3 p-2 bg-white rounded-full w-full justify-end"
            >
              <button
                type="button"
                id="delete-btn"
                class="flex items-center gap-2 bg-red-100 hover:bg-red-200 text-red-700 text-sm font-bold py-2.5 px-6 rounded-full transition-colors mr-auto"
              >
                <i class="fa-solid fa-trash-can"></i> HAPUS MEMBER
              </button>
              <button
                type="button"
                onclick="showView('list-view')"
                class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-2.5 px-6 rounded-full transition-colors"
              >
                <i class="fa-solid fa-xmark"></i> BATAL
              </button>
              <button
                type="submit"
                class="flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-bold py-2.5 px-6 rounded-full transition-colors shadow-sm"
              >
                <i class="fa-solid fa-floppy-disk"></i> SIMPAN PERUBAHAN
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script>
      const STORAGE_KEY = "apc_members_data";
      const defaultMembers = [
        {
          id: 1,
          name: "Syaifudin",
          institution: "Bina sarana informatika",
          imageUrl: null,
        },
        {
          id: 2,
          name: "Reymond",
          institution: "Universitas Indonesia",
          imageUrl: "https://randomuser.me/api/portraits/men/32.jpg",
        },
        {
          id: 3,
          name: "Siti Aminah",
          institution: "Institut Teknologi Bandung",
          imageUrl: null,
        },
      ];

      let membersData =
        JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultMembers;
      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(membersData));
      }

      let currentAddImageBase64 = null,
        currentEditImageBase64 = null;

      function renderMembers() {
        const grid = document.getElementById("members-grid");
        grid.innerHTML = "";
        membersData.forEach((member) => {
          const card = document.createElement("div");
          card.className =
            "border border-sky-100 rounded-2xl p-6 flex flex-col items-center justify-center text-center cursor-pointer hover:shadow-md hover:border-sky-300 transition-all bg-white h-full group";
          card.onclick = () => openEditView(member.id);

          let imageElement = member.imageUrl
            ? `<img src="${member.imageUrl}" alt="${member.name}" class="w-20 h-20 rounded-full border-2 border-sky-200 mb-4 object-cover group-hover:scale-105 transition-transform">`
            : `<div class="w-20 h-20 rounded-full border-2 border-sky-100 mb-4 bg-sky-50 flex items-center justify-center text-sky-400 group-hover:scale-105 transition-transform"><i class="fa-solid fa-user text-3xl"></i></div>`;

          card.innerHTML = `
                    ${imageElement}
                    <h3 class="font-bold text-slate-800 text-sm line-clamp-2">${member.name}</h3>
                    <p class="text-xs text-slate-500 mt-1 line-clamp-1">${member.institution}</p>
                `;
          grid.appendChild(card);
        });
      }

      function showView(viewId) {
        document.getElementById("list-view").classList.add("hidden");
        document.getElementById("add-view").classList.add("hidden");
        document.getElementById("edit-view").classList.add("hidden");
        document.getElementById(viewId).classList.remove("hidden");
        if (viewId === "list-view") {
          resetImagePreview("add");
          resetImagePreview("edit");
        }
      }

      function openEditView(id) {
        const member = membersData.find((m) => m.id === id);
        if (member) {
          document.getElementById("edit-id").value = member.id;
          document.getElementById("edit-name").value = member.name;
          document.getElementById("edit-institution").value =
            member.institution;
          currentEditImageBase64 = member.imageUrl;
          if (member.imageUrl) {
            showImagePreview("edit", member.imageUrl);
          } else {
            resetImagePreview("edit");
          }
          showView("edit-view");
        }
      }

      function handleImageUpload(inputId, previewPrefix) {
        document
          .getElementById(inputId)
          .addEventListener("change", function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
              const base64String = event.target.result;
              if (previewPrefix === "add") currentAddImageBase64 = base64String;
              else currentEditImageBase64 = base64String;
              showImagePreview(previewPrefix, base64String);
            };
            reader.readAsDataURL(file);
          });
      }

      function showImagePreview(prefix, imgSrc) {
        document.getElementById(`${prefix}-preview`).src = imgSrc;
        document.getElementById(`${prefix}-preview`).classList.remove("hidden");
        document
          .getElementById(`${prefix}-placeholder-icon`)
          .classList.add("hidden");
      }

      function resetImagePreview(prefix) {
        document.getElementById(`${prefix}-preview`).src = "#";
        document.getElementById(`${prefix}-preview`).classList.add("hidden");
        document
          .getElementById(`${prefix}-placeholder-icon`)
          .classList.remove("hidden");
        document.getElementById(`${prefix}-file`).value = "";
        if (prefix === "add") currentAddImageBase64 = null;
        if (prefix === "edit") currentEditImageBase64 = null;
      }

      handleImageUpload("add-file", "add");
      handleImageUpload("edit-file", "edit");

      document
        .getElementById("add-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const newId =
            membersData.length > 0
              ? Math.max(...membersData.map((m) => m.id)) + 1
              : 1;
          membersData.push({
            id: newId,
            name: document.getElementById("add-name").value,
            institution: document.getElementById("add-institution").value,
            imageUrl: currentAddImageBase64,
          });
          saveData();
          this.reset();
          renderMembers();
          showView("list-view");
          Swal.fire({
            title: "Tersimpan!",
            text: "Member baru berhasil ditambahkan.",
            icon: "success",
            timer: 1500,
            showConfirmButton: false,
            confirmButtonColor: "#0ea5e9",
          });
        });

      document
        .getElementById("edit-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const idToEdit = parseInt(document.getElementById("edit-id").value);
          const index = membersData.findIndex((m) => m.id === idToEdit);
          if (index !== -1) {
            membersData[index].name =
              document.getElementById("edit-name").value;
            membersData[index].institution =
              document.getElementById("edit-institution").value;
            membersData[index].imageUrl = currentEditImageBase64;
          }
          saveData();
          renderMembers();
          showView("list-view");
          Swal.fire({
            title: "Diperbarui!",
            text: "Data member berhasil diubah.",
            icon: "success",
            timer: 1500,
            showConfirmButton: false,
            confirmButtonColor: "#0ea5e9",
          });
        });

      document
        .getElementById("delete-btn")
        .addEventListener("click", function () {
          const idToDelete = parseInt(document.getElementById("edit-id").value);
          const memberName = document.getElementById("edit-name").value;
          Swal.fire({
            title: "Hapus Member?",
            text: `Apakah Anda yakin ingin menghapus "${memberName}"?`,
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#ef4444",
            cancelButtonColor: "#64748b",
            confirmButtonText: "Ya, Hapus!",
            cancelButtonText: "Batal",
            reverseButtons: true,
          }).then((result) => {
            if (result.isConfirmed) {
              membersData = membersData.filter((m) => m.id !== idToDelete);
              saveData();
              renderMembers();
              showView("list-view");
              Swal.fire({
                title: "Terhapus!",
                text: `Member "${memberName}" berhasil dihapus.`,
                icon: "success",
                timer: 1500,
                showConfirmButton: false,
              });
            }
          });
        });

      renderMembers();
    </script>
  </body>
</html>
